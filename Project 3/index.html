<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body>
    <div class="container">
        <div class="calculator-screen">
            <h1 id="calculator-screen-text">1</h1>
        </div>
        <div class="calculator-body">
            <div class="numbers">
                <input type="button" value="1" id="number1" onclick="num1()">
                <input type="button" value="2" id="number2" onclick="num2()">
                <input type="button" value="3" id="number3" onclick="num3()">
                <input type="button" value="4" id="number4" onclick="num4()">
                <input type="button" value="5" id="number5" onclick="num5()">
                <input type="button" value="6" id="number6" onclick="num6()">
                <input type="button" value="7" id="number7" onclick="num7()">
                <input type="button" value="8" id="number8" onclick="num8()">
                <input type="button" value="9" id="number9" onclick="num9()">
                <input type="button" value="-" onclick="minus()">
                <input type="button" value="0" id="number0" onclick="num0()">
                <input type="button" value="+" onclick="plus()">
            </div>

            <div class="function">
                <input type="button" value="/" onclick="divide()">
                <input type="button" value="*" onclick="multiplication()">
                <input type="button" value="C" onclick="clearText()">
                <input type="button" value="=" onclick="equal()">
            </div>
        </div>
    </div>
</body>

</html>
